version: '3.8'

services:
  express-tasa-api:
    build: .
    container_name: express-tasa-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "10001"
      BACKEND_URL: "http://express-tasa-api:10001"
      CORS_ORIGINS: "https://${DOMAIN_TASA}"
    volumes:
      - express-tasa-data:/app/data
    networks:
      - traefik-net
      - express-tasa-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"

      # HTTP → HTTPS (middleware definido en tu servicio traefik)
      - "traefik.http.routers.tasa-http.entrypoints=web"
      - "traefik.http.routers.tasa-http.rule=Host(`${DOMAIN_TASA}`)"
      - "traefik.http.routers.tasa-http.middlewares=redirect-to-https@docker"

      # HTTPS
      - "traefik.http.routers.tasa-https.entrypoints=websecure"
      - "traefik.http.routers.tasa-https.rule=Host(`${DOMAIN_TASA}`)"
      - "traefik.http.routers.tasa-https.tls=true"
      - "traefik.http.routers.tasa-https.tls.certresolver=myresolver"
      - "traefik.http.routers.tasa-https.service=tasa-svc"

      # Puerto interno Gunicorn
      - "traefik.http.services.tasa-svc.loadbalancer.server.port=10001"

  express-tasa-scraper:
    build: .
    container_name: express-tasa-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_URL: "http://express-tasa-api:10001"
      PLAYWRIGHT_HEADLESS: "true"
      SCRAPER_INTERVAL_SECONDS: "${SCRAPER_INTERVAL_SECONDS:-3600}"
    volumes:
      - express-tasa-data:/app/data
    networks:
      - express-tasa-net
    depends_on:
      express-tasa-api:
        condition: service_healthy
    command: >
      sh -c "while true; do
        python /app/scraper/extract.py || true;
        sleep $${SCRAPER_INTERVAL_SECONDS};
      done"

networks:
  traefik-net:
    external: true
  express-tasa-net:
    driver: bridge

volumes:
  express-tasa-data:
