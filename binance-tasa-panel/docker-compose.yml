version: '3.8'

services:
  veshoy-api:
    build: .
    container_name: veshoy-api
    restart: unless-stopped
    # Mantenemos esto para que Docker asocie las variables del panel de Portainer
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "10001"
      BACKEND_URL: "http://veshoy-api:10001"
      CORS_ORIGINS: "https://${DOMAIN_TASA}" # <--- Dinámico
    volumes:
      - veshoy-data:/app/data
    networks:
      - traefik-net
      - veshoy-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"

      # Redirección HTTP → HTTPS
      - "traefik.http.routers.veshoy-http.entrypoints=web"
      - "traefik.http.routers.veshoy-http.rule=Host(`${DOMAIN_TASA}`)" # <--- Dinámico
      - "traefik.http.routers.veshoy-http.middlewares=redirect-to-https@docker"

      # Reglas HTTPS con tu certificado
      - "traefik.http.routers.veshoy-https.entrypoints=websecure"
      - "traefik.http.routers.veshoy-https.rule=Host(`${DOMAIN_TASA}`)" # <--- Dinámico
      - "traefik.http.routers.veshoy-https.tls=true"
      - "traefik.http.routers.veshoy-https.tls.certresolver=myresolver"
      - "traefik.http.routers.veshoy-https.service=veshoy-svc"

      # Puerto interno del contenedor
      - "traefik.http.services.veshoy-svc.loadbalancer.server.port=10001"

  veshoy-scraper:
    build: .
    container_name: veshoy-scraper
    restart: unless-stopped
    environment:
      BACKEND_URL: "http://veshoy-api:10001"
      PLAYWRIGHT_HEADLESS: "true"
      SCRAPER_INTERVAL_SECONDS: "${SCRAPER_INTERVAL_SECONDS:-3600}" # <--- Dinámico con valor por defecto
    volumes:
      - veshoy-data:/app/data
    networks:
      - veshoy-net
    depends_on:
      veshoy-api:
        condition: service_healthy
    command: >
      sh -c "while true; do
        python /app/scraper/extract.py || true;
        sleep $${SCRAPER_INTERVAL_SECONDS};
      done"

networks:
  traefik-net:
    external: true
  veshoy-net:
    driver: bridge

volumes:
  veshoy-data:
    driver: local
